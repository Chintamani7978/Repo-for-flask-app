#API keys .sensitive data
name: Secrets Scan

on:
    workflow_call:
jobs:
    secrets-scan:
        runs-on: ubuntu-latest

        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: Run GItLeaks Scanner
              uses: gitleaks/gitkeaks-activation@v2
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}